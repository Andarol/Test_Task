apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service-{{ .Values.environment }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: charts/order-service
    helm:
      releaseName: order-service
      values: |
{{ toYaml .Values.orderService | indent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: order-service-{{ .Values.environment }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

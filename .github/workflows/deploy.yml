name: Manual application release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitOps environment to release
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: order-service-release-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release ${{ inputs.environment }}
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write

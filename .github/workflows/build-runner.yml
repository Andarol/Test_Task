name: Build ARC runner image

on:
  push:
    branches:
      - main
    paths:
      - runner/**
      - .github/workflows/build-runner.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-arc-runner-image
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish ARC runner image
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GCP_STAGING_PROJECT_ID }}
      REGION: europe-west3
      IMAGE: europe-west3-docker.pkg.dev/${{ vars.GCP_STAGING_PROJECT_ID }}/order-service/runner:${{ github.sha }}
      WIF_PROVIDER: ${{ vars.GCP_STAGING_WIF_PROVIDER }}
      TERRAFORM_SA: ${{ vars.GCP_STAGING_TERRAFORM_SA }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.TERRAFORM_SA }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Check immutable image tag
        id: image
        run: |
          if gcloud artifacts docker tags list "${REGION}-docker.pkg.dev/${PROJECT_ID}/order-service/runner" \
            --filter="tag:${GITHUB_SHA}" \
            --format='value(tag)' | grep -Fxq "$GITHUB_SHA"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists: $IMAGE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push immutable image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            IMAGE_COMMIT=${{ github.sha }}

      - name: Report published image
        run: echo "Published $IMAGE"

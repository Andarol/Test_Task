name: Release application environment

on:
  workflow_call:
    inputs:
      environment:
        description: Environment under gitops/environments
        required: true
        type: string
      build_image:
        description: Build and push the application image before updating GitOps
        required: true
        type: boolean
      image_tag:
        description: Immutable image tag to deploy
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release tested image
    runs-on: arc-${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    env:
      REGION: europe-west3
      PROJECT_ID: ${{ inputs.environment == 'staging' && vars.GCP_STAGING_PROJECT_ID || vars.GCP_PRODUCTION_PROJECT_ID }}
      WIF_PROVIDER: ${{ inputs.environment == 'staging' && vars.GCP_STAGING_WIF_PROVIDER || vars.GCP_PRODUCTION_WIF_PROVIDER }}
      DEPLOY_SA: ${{ inputs.environment == 'staging' && vars.GCP_STAGING_DEPLOY_SA || vars.GCP_PRODUCTION_DEPLOY_SA }}
      VALUES_FILE: gitops/environments/${{ inputs.environment }}/values.yaml
      IMAGE_TAG: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate immutable image tag
        run: |
          [[ "$IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]] || {
            echo "image_tag must be a 40-character commit SHA" >&2
            exit 2
          }

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify application
        if: inputs.build_image
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -race ./...

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@v3
      - run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build and push immutable image
        if: inputs.build_image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/order-service/order-service:${{ inputs.image_tag }}
        run: |
          docker build --tag "$IMAGE" .
          docker push "$IMAGE"

      - name: Verify promoted image exists
        if: ${{ !inputs.build_image }}
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/order-service/order-service:${{ inputs.image_tag }}
        run: docker manifest inspect "$IMAGE" >/dev/null

      - name: Record image in GitOps values
        run: |
          python3 - "$VALUES_FILE" "$IMAGE_TAG" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          tag = sys.argv[2]
          source = path.read_text()
          if re.search(r"(?m)^  enabled: false$", source):
              raise SystemExit(f"{path} is disabled until its foundation outputs are configured")
          updated, count = re.subn(
              r"(?m)^(  image:\n    repository: [^\n]+\n    tag:) [^\n]+$",
              rf"\1 {tag}",
              source,
              count=1,
          )
          if count != 1:
              raise SystemExit(f"could not update image tag in {path}")
          path.write_text(updated)
          PY

      - name: Push GitOps release to main
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if git diff --quiet -- "$VALUES_FILE"; then
            echo "GitOps already references $IMAGE_TAG"
            exit 0
          fi
          git config user.name "order-service-gitops[bot]"
          git config user.email "order-service-gitops[bot]@users.noreply.github.com"
          git add "$VALUES_FILE"
          git commit -m "chore(gitops): deploy $ENVIRONMENT $IMAGE_TAG"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Deployment handoff
        run: echo "Argo CD will reconcile $VALUES_FILE from main; no Terraform or kubectl application step is required."

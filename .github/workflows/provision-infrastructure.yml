name: Manual infrastructure component

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Infrastructure environment
        required: true
        type: choice
        options:
          - staging
          - production
      component:
        description: Long-lived component to provision or change
        required: true
        type: choice
        options:
          - foundation
          - cluster
          - gitops
          - global
      recover_tainted_cluster:
        description: One-time recovery after an interrupted GKE creation
        required: false
        default: false
        type: boolean
      reset_cluster:
        description: Delete and recreate the selected environment GKE cluster layer
        required: false
        default: false
        type: boolean
      import_cluster_resources:
        description: Create worker pool with GKE API and import fresh cluster resources into state
        required: false
        default: false
        type: boolean
      import_node_pool_only:
        description: Import an already-created application node pool into cluster state
        required: false
        default: false
        type: boolean

concurrency:
  group: order-service-infrastructure-${{ inputs.environment }}-${{ inputs.component }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Apply ${{ inputs.environment }}/${{ inputs.component }}
    uses: ./.github/workflows/provision-component.yml
    with:
      environment: ${{ inputs.environment }}
      component: ${{ inputs.component }}
      recover_tainted_cluster: ${{ inputs.recover_tainted_cluster }}
      reset_cluster: ${{ inputs.reset_cluster }}
      import_cluster_resources: ${{ inputs.import_cluster_resources }}
      import_node_pool_only: ${{ inputs.import_node_pool_only }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write

name: Setup Terragrunt
description: Install a pinned Terragrunt binary in the current self-hosted runner job
inputs:
  version:
    description: Terragrunt version without the v prefix
    required: false
    default: 1.0.4
runs:
  using: composite
  steps:
    - shell: bash
      env:
        TERRAGRUNT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        url="https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/terragrunt_linux_amd64"
        curl --fail --silent --show-error --location "$url" --output "$RUNNER_TEMP/terragrunt"
        chmod +x "$RUNNER_TEMP/terragrunt"
        echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
        "$RUNNER_TEMP/terragrunt" --version

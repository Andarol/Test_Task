name: Terragrunt apply
description: Authenticate to GCP and apply one or more Terragrunt components
inputs:
  environment:
    description: Environment directory under environments/
    required: true
  working_directories:
    description: Newline-separated Terragrunt component directories
    required: true
  project_id:
    description: Google Cloud project ID
    required: true
  workload_identity_provider:
    description: Google Workload Identity provider resource name
    required: true
  service_account:
    description: Terraform service account email
    required: true
  untaint_addresses:
    description: Optional newline-separated Terraform addresses to recover before apply
    required: false
    default: ""
  state_rm_addresses:
    description: Optional newline-separated Terraform addresses to forget after an external reset
    required: false
    default: ""
  state_imports:
    description: Optional newline-separated Terraform address=ID imports after an external create
    required: false
    default: ""
  attempts:
    description: Apply attempts per component
    required: false
    default: "1"
  retry_delay_seconds:
    description: Delay between apply attempts
    required: false
    default: "30"
runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
    - uses: ./.github/actions/setup-terragrunt
    - uses: google-github-actions/auth@v3
      with:
        project_id: ${{ inputs.project_id }}
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
    - name: Apply Terragrunt components
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        PROJECT_ID: ${{ inputs.project_id }}
        GCP_PROJECT_ID: ${{ inputs.project_id }}
        WORKING_DIRECTORIES: ${{ inputs.working_directories }}
        UNTAINT_ADDRESSES: ${{ inputs.untaint_addresses }}
        STATE_RM_ADDRESSES: ${{ inputs.state_rm_addresses }}
        STATE_IMPORTS: ${{ inputs.state_imports }}
        APPLY_ATTEMPTS: ${{ inputs.attempts }}
        RETRY_DELAY_SECONDS: ${{ inputs.retry_delay_seconds }}
        TF_IN_AUTOMATION: "true"
        TF_INPUT: "false"
        TERRAGRUNT_NON_INTERACTIVE: "true"
      run: |
        set -euo pipefail

        case "$ENVIRONMENT" in
          staging|production) ;;
          *) echo "Unsupported environment: $ENVIRONMENT" >&2; exit 2 ;;
        esac

        while IFS= read -r directory; do
          [ -n "$directory" ] || continue

          while IFS= read -r address; do
            [ -n "$address" ] || continue
            set +e
            untaint_output="$(cd "$GITHUB_WORKSPACE/$directory" && terragrunt run -- untaint "$address" 2>&1)"
            untaint_status=$?
            set -e
            printf '%s\n' "$untaint_output"
            if [ "$untaint_status" -ne 0 ] && [[ "$untaint_output" != *"is not tainted"* ]]; then
              exit "$untaint_status"
            fi
          done <<< "$UNTAINT_ADDRESSES"

          while IFS= read -r address; do
            [ -n "$address" ] || continue
            (cd "$GITHUB_WORKSPACE/$directory" && terragrunt run -- state rm "$address")
          done <<< "$STATE_RM_ADDRESSES"

          while IFS='=' read -r address resource_id; do
            [ -n "$address" ] || continue
            [ -n "$resource_id" ] || { echo "Invalid state import: $address" >&2; exit 2; }
            (cd "$GITHUB_WORKSPACE/$directory" && terragrunt run -- import "$address" "$resource_id")
          done < <(printf '%s\n' "$STATE_IMPORTS" | tr ',' '\n')

          attempt=1
          while true; do
            if (cd "$GITHUB_WORKSPACE/$directory" && terragrunt run -- apply -lock-timeout=5m -auto-approve); then
              break
            fi
            if [ "$attempt" -ge "$APPLY_ATTEMPTS" ]; then
              echo "Terragrunt apply failed after $attempt attempt(s): $directory" >&2
              exit 1
            fi
            echo "Terragrunt apply retry $attempt/$APPLY_ATTEMPTS for $directory in ${RETRY_DELAY_SECONDS}s"
            sleep "$RETRY_DELAY_SECONDS"
            attempt=$((attempt + 1))
          done
        done <<< "$WORKING_DIRECTORIES"

apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: order-service
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: api
  annotations:
    cloud.google.com/neg: '{"exposed_ports":{"80":{"name":"order-service"}}}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

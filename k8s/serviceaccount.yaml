apiVersion: v1
kind: Namespace
metadata:
  name: order-service
  labels:
    app.kubernetes.io/name: order-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  namespace: order-service
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: api
  annotations:
    iam.gke.io/gcp-service-account: order-service@PROJECT_ID.iam.gserviceaccount.com
automountServiceAccountToken: true

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: order-service-database
  namespace: order-service
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/order-service-db-password/versions/latest"
        path: "database-password"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: order-service-db
  namespace: order-service
spec:
  serviceAccountName: order-service
  secretProviderClassName: order-service-database
  secretObject:
    type: Opaque
    data:
      - sourcePath: database-password
        targetKey: password
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: order-service-cache
  namespace: order-service
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/order-service-redis-auth/versions/latest"
        path: "redis-auth"
      - resourceName: "projects/PROJECT_ID/secrets/order-service-redis-ca/versions/latest"
        path: "redis-ca"
---
apiVersion: secret-sync.gke.io/v1
kind: SecretSync
metadata:
  name: order-service-cache
  namespace: order-service
spec:
  serviceAccountName: order-service
  secretProviderClassName: order-service-cache
  secretObject:
    type: Opaque
    data:
      - sourcePath: redis-auth
        targetKey: auth
      - sourcePath: redis-ca
        targetKey: ca.crt
